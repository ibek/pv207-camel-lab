<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Request Triage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #202124;
      line-height: 1.6;
      padding: 2rem 1rem;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.5rem; font-weight: 600; }
    .subtitle { color: #5f6368; margin-bottom: 1.5rem; }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; }
    label { display: block; font-weight: 500; margin: .75rem 0 .25rem; font-size: .9rem; }
    select, textarea {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: .95rem;
      font-family: inherit;
    }
    textarea { resize: vertical; }
    button {
      margin-top: 1rem;
      padding: .6rem 1.5rem;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: .95rem;
      cursor: pointer;
    }
    button:hover { background: #1557b0; }
    button:disabled { background: #94bef7; cursor: not-allowed; }
    .process-key {
      font-family: 'Roboto Mono', ui-monospace, monospace;
      background: #e8f0fe;
      padding: .2rem .5rem;
      border-radius: 3px;
    }
    .hidden { display: none; }
    .operate-link {
      color: #1a73e8;
      text-decoration: none;
      word-break: break-all;
    }
    .operate-link:hover { text-decoration: underline; }
    .error-banner {
      background: #fce8e6;
      color: #c5221f;
      padding: .75rem 1rem;
      border-radius: 4px;
      margin-top: .75rem;
      font-size: .9rem;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Customer Request Triage</h1>
  <p class="subtitle">Apache Camel + Camunda 8 SaaS Demo</p>

  <div class="card">
    <h2>Start Process</h2>
    <form id="startForm">
      <label for="customerTier">Customer Tier</label>
      <select id="customerTier" name="customerTier">
        <option value="STANDARD">Standard</option>
        <option value="PREMIUM">Premium</option>
        <option value="ENTERPRISE">Enterprise</option>
      </select>

      <label for="customerMessage">Customer Message</label>
      <textarea id="customerMessage" name="customerMessage" rows="4"
        placeholder="e.g. 'I'd like to cancel order #ORD-12345' or 'I want a refund for #ORD-99999'"></textarea>

      <button type="submit" id="submitBtn">Start Process</button>
      <div id="formError" class="error-banner hidden"></div>
    </form>
  </div>

  <div id="resultCard" class="card hidden">
    <h2>Process Instance</h2>
    <p>Key: <span id="processKey" class="process-key"></span></p>
    <p style="margin-top: .75rem;">
      Operate:
      <a id="operateLink" class="operate-link" target="_blank" rel="noopener noreferrer"></a>
    </p>
  </div>
</div>

<script>
  const form        = document.getElementById('startForm');
  const submitBtn   = document.getElementById('submitBtn');
  const formError   = document.getElementById('formError');
  const resultCard  = document.getElementById('resultCard');
  const processKey  = document.getElementById('processKey');
  const operateLink = document.getElementById('operateLink');
  let operateBaseUrl = 'https://bru-2.operate.camunda.io/c2638e36-e194-4c35-a4d9-d7933878005f/operate/processes/';

  loadUiConfig();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    formError.classList.add('hidden');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Starting\u2026';

    const body = {
      customerTier: document.getElementById('customerTier').value,
      customerMessage: document.getElementById('customerMessage').value
    };

    try {
      const res = await fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || res.statusText);
      }
      const data = await res.json();

      processKey.textContent = data.process_instance_key;
      const operateUrl = operateBaseUrl + encodeURIComponent(data.process_instance_key);
      operateLink.href = operateUrl;
      operateLink.textContent = operateUrl;
      resultCard.classList.remove('hidden');
    } catch (err) {
      formError.textContent = err.message;
      formError.classList.remove('hidden');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Start Process';
    }
  });

  async function loadUiConfig() {
    try {
      const res = await fetch('/api/config');
      if (!res.ok) {
        throw new Error('Failed to load UI config');
      }
      const config = await res.json();
      if (typeof config.operateBaseUrl === 'string' && config.operateBaseUrl.length > 0) {
        operateBaseUrl = config.operateBaseUrl;
      }
    } catch (err) {
      console.warn('Falling back to static Operate URL', err);
      operateBaseUrl = 'https://bru-2.operate.camunda.io/c2638e36-e194-4c35-a4d9-d7933878005f/operate/processes/';
    }
  }
</script>

</body>
</html>
