camel.jbang.dependencies=io.camunda:camunda-client-java:8.8.19

camel.server.enabled=true
camel.server.staticEnabled=true

# Camunda 8 SaaS connection (used by the camunda-saas bean)
camunda.cluster-id={{env:CAMUNDA_CLUSTER_ID}}
camunda.region={{env:CAMUNDA_REGION}}
camunda.client-id={{env:CAMUNDA_CLIENT_ID}}
camunda.client-secret={{env:CAMUNDA_CLIENT_SECRET}}

# OpenAI connection (used by the openai component)
# Set env vars to enable LLM classification; without them the app
# falls back to keyword-based triage.
openai.enabled=true
camel.component.openai.apiKey={{env:OPENAI_API_KEY:sk-proj-1234567890}}
camel.component.openai.baseUrl={{env:OPENAI_BASE_URL:https://api.openai.com/v1}}
camel.component.openai.model={{env:OPENAI_MODEL:gpt-5}}
