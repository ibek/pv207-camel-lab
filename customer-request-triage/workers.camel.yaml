# ─── Declarative error handling for all Camunda worker routes ───

# The worker consumer auto-completes jobs on success and auto-fails on
# exception. The only explicit handling needed is mapping
# BusinessBpmnError → BPMN error via the throwError producer.

- routeConfiguration:
    id: worker-error-handling
    onException:
      - onException:
          exception:
            - BusinessBpmnError
          handled:
            constant:
              expression: "true"
          steps:
            - setHeader:
                name: CamelCamundaErrorCode
                simple: ${exception.errorCode}
            - setHeader:
                name: CamelCamundaErrorMessage
                simple: ${exception.message}
            - to:
                uri: camunda://throwError
- route:
    id: worker-handle-cancel
    description: Handle cancel
    routeConfigurationId: worker-error-handling
    from:
      uri: camunda:worker?jobType=handle-cancel
      steps:
        - setBody:
            description: Extract process variables
            simple: ${body.variables}
        - log:
            description: Log cancel
            message: Cancelling order ${body[orderId]}
        - delay:
            description: Wait briefly
            constant: "500"
        - setBody:
            description: Build result
            constant: '{"cancellationStatus":"CONFIRMED"}'
        - unmarshal:
            description: Convert to Map for output variables
            json: {}
- route:
    id: worker-handle-refund
    description: Handle refund
    routeConfigurationId: worker-error-handling
    from:
      uri: camunda:worker?jobType=handle-refund
      steps:
        - setBody:
            description: Extract process variables
            simple: ${body.variables}
        - choice:
            description: Validate order
            when:
              - simple: ${body[orderId]} == null || ${body[orderId]} == ''
                description: Handle missing order
                steps:
                  - throwException:
                      description: Throw BPMN error
                      exceptionType: BusinessBpmnError
                      message: "MISSING_ORDER_ID: Cannot process refund without an order ID"
        - log:
            description: Log refund
            message: Initiating refund for order ${body[orderId]}
        - delay:
            description: Wait briefly
            constant: "800"
        - setBody:
            description: Build result
            constant: '{"refundStatus":"INITIATED"}'
        - unmarshal:
            description: Convert to Map for output variables
            json: {}
- route:
    id: worker-handle-other
    description: Handle other
    routeConfigurationId: worker-error-handling
    from:
      uri: camunda:worker?jobType=handle-other
      steps:
        - setBody:
            description: Extract process variables
            simple: ${body.variables}
        - log:
            description: Log escalation
            message: No automated handler — forwarding to human agent
        - delay:
            description: Wait briefly
            constant: "300"
        - setBody:
            description: Build result
            constant: '{"escalationStatus":"FORWARDED_TO_AGENT"}'
        - unmarshal:
            description: Convert to Map for output variables
            json: {}
